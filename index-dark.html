<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tala | Coming Soon</title>
    <meta name="description" content="tala — coffee & patisserie. Coming soon to Zurich." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style-dark.css">
  </head>
  <body>
    <div id="app">
      <div class="page">

        <!-- Top bar -->
        <header class="top-bar">
          <span class="brand-mark">tala</span>
          <span class="top-label">café</span>
        </header>

        <!-- Center content -->
        <main class="center-content">
          <div class="headline-group">
            <span class="headline-line">coming</span>
            <span class="headline-line italic offset">soon</span>
          </div>

          <div class="divider"></div>

          <p class="location-line">Zürich</p>
        </main>

        <!-- Bottom bar -->
        <footer class="bottom-bar">
          <span class="status-dot"></span>
        </footer>

      </div>
    </div>
  </body>
</html>
