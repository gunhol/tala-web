<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tala | Coming Soon</title>
    <meta name="description" content="tala — café. Coming soon to Zürich." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style-min.css">
    <!-- set theme before first paint to avoid flash -->
    <script>
      (function() {
        var saved = localStorage.getItem('tala-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
      })();
    </script>
  </head>
  <body>
    <div id="app">

      <!-- Night sky star field -->
      <div class="star-field" aria-hidden="true">
        <span class="star sz-m" style="top:5%;right:22%"></span>
        <span class="star sz-s" style="top:11%;right:40%"></span>
        <span class="star sz-l" style="top:7%;right:12%"></span>
        <span class="star sz-s" style="top:18%;right:28%"></span>
        <span class="star sz-m" style="top:3%;right:55%"></span>
        <span class="star sz-s" style="top:9%;right:68%"></span>
        <span class="star sz-l" style="top:15%;right:8%"></span>
        <span class="star sz-s" style="top:22%;right:48%"></span>
        <span class="star sz-m" style="top:2%;right:35%"></span>
        <span class="star sz-s" style="top:26%;right:15%"></span>
        <span class="star sz-l" style="top:6%;right:80%"></span>
        <span class="star sz-s" style="top:13%;right:72%"></span>
        <span class="star sz-m" style="top:20%;right:62%"></span>
        <span class="star sz-s" style="top:30%;right:5%"></span>
        <span class="star sz-l" style="top:4%;right:90%"></span>
      </div>

      <div class="page">

        <!-- Top bar -->
        <header class="top-bar">
          <span class="brand-mark">tala</span>
          <div class="top-right">
            <span class="top-label">café</span>
            <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme">
              <!-- Philippine eight-rayed sun — shown in night mode, click to switch to day -->
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <g transform="translate(12 12)">
                  <circle r="2.8" fill="currentColor"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(45)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(90)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(135)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(180)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(225)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(270)"/>
                  <polygon points="0,-10 -0.9,-4.8 0.9,-4.8" fill="currentColor" transform="rotate(315)"/>
                </g>
              </svg>
              <!-- Four-pointed star — shown in day mode, click to switch to night -->
              <svg class="icon-star" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <path d="M12 2L13.5 10.5L22 12L13.5 13.5L12 22L10.5 13.5L2 12L10.5 10.5Z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </header>

        <!-- Center content -->
        <main class="center-content">
          <div class="headline-group">
            <span class="headline-line">coming</span>
            <span class="headline-line italic offset">soon</span>
          </div>
          <div class="divider"></div>
          <p class="location-line">Zürich</p>
        </main>

        <!-- Bottom bar -->
        <footer class="bottom-bar">
          <span class="status-dot"></span>
        </footer>

      </div>
    </div>

    <script>
      var toggle = document.getElementById('theme-toggle');
      toggle.addEventListener('click', function() {
        var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('tala-theme', next);
        toggle.setAttribute('aria-label', next === 'dark' ? 'Switch to day' : 'Switch to night');
      });
    </script>
  </body>
</html>
